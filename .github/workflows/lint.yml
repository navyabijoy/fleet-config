name: Playbook Lint & Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ansible-lint + yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lint.txt

      - name: Install linting tools
        run: pip install -r requirements-lint.txt

      - name: Install Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint playbooks/

      - name: Syntax check — all playbooks
        run: |
          for pb in playbooks/*.yml; do
            echo "==> Syntax check: $pb"
            ansible-playbook --syntax-check "$pb" -i tests/stub_inventory
          done
