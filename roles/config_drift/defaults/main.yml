---
# Report mode (default): detect and log drift, fail task to alert AWX.
# Fix mode: set config_drift_fix=true via AWX extra vars to auto-remediate.
config_drift_fix: false

# Where to write the drift report on each managed host
config_drift_log_file: /var/log/ansible_drift.log

# sshd_config path (Ubuntu 22.04 default)
config_drift_sshd_config_path: /etc/ssh/sshd_config
